kind = "web"
previewPath = "/"
title = "PDF Manager & Converter"
version = "1.0.0"
id = "artifacts/pdf-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23823

[services.development]
run = "pnpm --filter @workspace/pdf-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pdf-platform", "run", "build" ]
publicDir = "artifacts/pdf-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23823"
BASE_PATH = "/"
